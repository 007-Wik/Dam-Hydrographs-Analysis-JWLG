<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <!-- Dark engineering blueprint gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#0d1b3e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#081428;stop-opacity:1"/>
    </linearGradient>
    <!-- Blueprint grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a3a6e" stroke-width="0.4" opacity="0.6"/>
    </pattern>
    <pattern id="gridSmall" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#1a3a6e" stroke-width="0.15" opacity="0.3"/>
    </pattern>
    <!-- Water wave gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1976D2;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:0.1"/>
    </linearGradient>
    <!-- Hydrograph line gradient -->
    <linearGradient id="hydroGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#00e5ff;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#29b6f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="hydroGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff1744;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#ff1744;stop-opacity:0.8"/>
      <stop offset="80%" style="stop-color:#ff6d00;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ff6d00;stop-opacity:0"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Shimmer gradient -->
    <linearGradient id="shimmer" x1="-100%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:white;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <!-- Clip path -->
    <clipPath id="bannerClip">
      <rect width="1200" height="340" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bannerClip)">
    <!-- Background -->
    <rect width="1200" height="340" fill="url(#bgGrad)"/>
    <!-- Grid overlay -->
    <rect width="1200" height="340" fill="url(#gridSmall)" opacity="0.8"/>
    <rect width="1200" height="340" fill="url(#grid)" opacity="1"/>

    <!-- Animated dam cross-section (left side engineering illustration) -->
    <!-- Dam body -->
    <polygon points="60,280 160,180 200,180 300,280" fill="#1a2f5e" stroke="#2a4a8e" stroke-width="1.5" opacity="0.7">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/>
    </polygon>
    <!-- Dam hatching lines -->
    <line x1="80" y1="270" x2="140" y2="190" stroke="#2a4a8e" stroke-width="0.8" opacity="0.4"/>
    <line x1="100" y1="275" x2="160" y2="195" stroke="#2a4a8e" stroke-width="0.8" opacity="0.4"/>
    <line x1="120" y1="278" x2="180" y2="195" stroke="#2a4a8e" stroke-width="0.8" opacity="0.4"/>
    <line x1="140" y1="280" x2="200" y2="198" stroke="#2a4a8e" stroke-width="0.8" opacity="0.4"/>
    <line x1="160" y1="280" x2="220" y2="200" stroke="#2a4a8e" stroke-width="0.8" opacity="0.4"/>
    <line x1="180" y1="280" x2="240" y2="202" stroke="#2a4a8e" stroke-width="0.8" opacity="0.4"/>
    <line x1="200" y1="280" x2="260" y2="200" stroke="#2a4a8e" stroke-width="0.8" opacity="0.4"/>
    <line x1="220" y1="280" x2="280" y2="204" stroke="#2a4a8e" stroke-width="0.8" opacity="0.4"/>
    <line x1="240" y1="280" x2="295" y2="215" stroke="#2a4a8e" stroke-width="0.8" opacity="0.4"/>

    <!-- Reservoir water (animated waves) -->
    <path d="M0,195 Q20,188 40,195 Q60,202 80,195 Q100,188 120,195 Q140,202 160,195 L160,290 L0,290 Z" fill="url(#waveGrad)">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="-40,0" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M0,200 Q25,192 50,200 Q75,208 100,200 Q125,192 150,200 Q175,208 200,200 L200,290 L0,290 Z" fill="url(#waveGrad2)">
      <animateTransform attributeName="transform" type="translate" from="40,0" to="0,0" dur="2.5s" repeatCount="indefinite"/>
    </path>

    <!-- Water level line with glow -->
    <line x1="0" y1="193" x2="165" y2="193" stroke="#00e5ff" stroke-width="1.5" opacity="0.7" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/>
    </line>

    <!-- Downstream hydrograph animation -->
    <g transform="translate(280, 100)" filter="url(#glow)">
      <!-- Flood hydrograph path (OVTP shape) -->
      <polyline points="0,160 10,155 20,140 35,115 50,85 65,50 80,25 95,12 110,8 125,15 140,30 155,55 170,80 185,105 200,125 215,140 230,150 250,158 270,162 290,163 320,163"
        fill="none" stroke="url(#hydroGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="stroke-dasharray" from="0,1000" to="500,0" dur="2s" begin="0.5s" fill="freeze"/>
      </polyline>
      <!-- PIPG constant line -->
      <line x1="0" y1="162" x2="320" y2="162" stroke="url(#hydroGrad2)" stroke-width="1.5" stroke-dasharray="6,4">
        <animate attributeName="opacity" values="0;1" dur="1s" begin="1s" fill="freeze"/>
      </line>
      <!-- Peak marker dot -->
      <circle cx="110" cy="8" r="5" fill="#00e5ff" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.2s" fill="freeze"/>
        <animate attributeName="r" values="5;8;5" dur="2s" begin="1.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Right side: animated flow lines suggesting EAP/risk zones -->
    <g opacity="0.3">
      <path d="M900,340 Q950,320 1000,300 Q1050,280 1100,260 Q1150,240 1200,220" fill="none" stroke="#ff6d00" stroke-width="1" stroke-dasharray="8,6">
        <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M900,340 Q960,310 1020,290 Q1080,270 1140,250 Q1170,240 1200,230" fill="none" stroke="#ff6d00" stroke-width="0.8" stroke-dasharray="6,8" opacity="0.6">
        <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="2.5s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- ── TITLE SECTION ── -->
    <!-- Govt of Maharashtra label -->
    <text x="600" y="58" text-anchor="middle" font-family="'Courier New', monospace" font-size="11.5" fill="#64b5f6" letter-spacing="4" opacity="0">
      GOVERNMENT OF MAHARASHTRA  ·  WATER RESOURCES DEPARTMENT
      <animate attributeName="opacity" values="0;0.9" dur="0.8s" begin="0.2s" fill="freeze"/>
    </text>

    <!-- Main Title -->
    <text x="600" y="118" text-anchor="middle" font-family="'Georgia', serif" font-size="38" font-weight="bold" fill="white" filter="url(#textGlow)" opacity="0" letter-spacing="1">
      JAWALGAON DAM
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.5s" fill="freeze"/>
    </text>
    <!-- Shimmer on title -->
    <text x="600" y="118" text-anchor="middle" font-family="'Georgia', serif" font-size="38" font-weight="bold" fill="url(#shimmer)" letter-spacing="1">
      JAWALGAON DAM
    </text>

    <!-- Subtitle Line 1 -->
    <text x="600" y="152" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#90caf9" opacity="0" letter-spacing="2">
      DAM BREAK ANALYSIS  ·  SPF HYDROGRAPH  ·  SAFETY ASSESSMENT
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.9s" fill="freeze"/>
    </text>

    <!-- Thin divider line -->
    <line x1="380" y1="168" x2="820" y2="168" stroke="#1565C0" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.1s" fill="freeze"/>
      <animate attributeName="x1" from="600" to="380" dur="0.5s" begin="1.1s" fill="freeze"/>
      <animate attributeName="x2" from="600" to="820" dur="0.5s" begin="1.1s" fill="freeze"/>
    </line>

    <!-- Subtitle Line 2 -->
    <text x="600" y="190" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#546e7a" opacity="0">
      Medium Irrigation Project  ·  Barshi, Solapur District, Maharashtra, India
      <animate attributeName="opacity" values="0;0.9" dur="0.8s" begin="1.2s" fill="freeze"/>
    </text>

    <!-- Stats row -->
    <!-- Box 1 -->
    <g opacity="0">
      <rect x="345" y="212" width="145" height="58" rx="6" fill="#0d1b3e" stroke="#1565C0" stroke-width="1" opacity="0.8"/>
      <text x="417" y="233" text-anchor="middle" font-family="'Courier New', monospace" font-size="9.5" fill="#64b5f6" letter-spacing="1.5">FAILURE MODES</text>
      <text x="417" y="254" text-anchor="middle" font-family="'Georgia', serif" font-size="20" font-weight="bold" fill="white">2</text>
      <text x="417" y="264" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#546e7a">OVTP + PIPG</text>
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.4s" fill="freeze"/>
    </g>
    <!-- Box 2 -->
    <g opacity="0">
      <rect x="505" y="212" width="145" height="58" rx="6" fill="#0d1b3e" stroke="#00e5ff" stroke-width="1" opacity="0.8"/>
      <text x="577" y="233" text-anchor="middle" font-family="'Courier New', monospace" font-size="9.5" fill="#00e5ff" letter-spacing="1.5">PEAK DISCHARGE</text>
      <text x="577" y="253" text-anchor="middle" font-family="'Georgia', serif" font-size="19" font-weight="bold" fill="white">1838</text>
      <text x="577" y="264" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#546e7a">m³/s  OVTP PEAK</text>
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.6s" fill="freeze"/>
    </g>
    <!-- Box 3 -->
    <g opacity="0">
      <rect x="665" y="212" width="145" height="58" rx="6" fill="#0d1b3e" stroke="#4caf50" stroke-width="1" opacity="0.8"/>
      <text x="737" y="233" text-anchor="middle" font-family="'Courier New', monospace" font-size="9.5" fill="#81c784" letter-spacing="1.5">SIMULATION</text>
      <text x="737" y="253" text-anchor="middle" font-family="'Georgia', serif" font-size="19" font-weight="bold" fill="white">72 hr</text>
      <text x="737" y="264" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#546e7a">SPF EVENT DURATION</text>
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.8s" fill="freeze"/>
    </g>

    <!-- Author / reference row -->
    <g opacity="0">
      <text x="600" y="303" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#37474f" letter-spacing="2">
        PREPARED BY: SATWIK KAMLAKAR UDUPI  ·  DBA-JWLG-2026  ·  CWC / IS:11223 GUIDELINES
      </text>
      <animate attributeName="opacity" values="0;0.85" dur="0.8s" begin="2s" fill="freeze"/>
    </g>

    <!-- Flashing dot (live indicator) -->
    <circle cx="1150" cy="38" r="5" fill="#00e5ff">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="5;7;5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="1140" y="42" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#00e5ff" letter-spacing="1" opacity="0.7">ACTIVE STUDY</text>

    <!-- Corner bracket decorations (engineering drawing style) -->
    <g stroke="#1565C0" stroke-width="1.5" fill="none" opacity="0.5">
      <path d="M25,15 L15,15 L15,35"/>
      <path d="M1175,15 L1185,15 L1185,35"/>
      <path d="M25,325 L15,325 L15,305"/>
      <path d="M1175,325 L1185,325 L1185,305"/>
    </g>

    <!-- Border -->
    <rect x="1" y="1" width="1198" height="338" rx="11" fill="none" stroke="#1565C0" stroke-width="1.5" opacity="0.5"/>
    <rect x="4" y="4" width="1192" height="332" rx="9" fill="none" stroke="#0d47a1" stroke-width="0.5" opacity="0.3"/>

    <!-- Scan line effect -->
    <rect width="1200" height="340" fill="none">
      <animate attributeName="y" from="-20" to="360" dur="4s" repeatCount="indefinite"/>
    </rect>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="2" opacity="0.03">
      <animate attributeName="y1" from="-2" to="342" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y2" from="-2" to="342" dur="4s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>