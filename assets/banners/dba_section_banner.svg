<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" width="1200" height="80">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0d1b3e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0f1e;stop-opacity:1"/>
    </linearGradient> 
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#00e5ff;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#00e5ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:0"/>
    </linearGradient> 
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip2"><rect width="1200" height="80" rx="8"/></clipPath>
  </defs>
  <g clip-path="url(#clip2)">
    <rect width="1200" height="80" fill="url(#bg2)"/>
    <!-- Animated circuit lines -->
    <line x1="0" y1="40" x2="1200" y2="40" stroke="url(#lineGrad)" stroke-width="0.5" opacity="0.3"/>
    <!-- Pulse travelling dot -->
    <circle r="3" fill="#00e5ff" filter="url(#glow2)" opacity="0.9">
      <animateMotion dur="3s" repeatCount="indefinite" path="M0,40 L1200,40"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Section icon: waveform (breach hydrograph) -->
    <polyline points="20,55 50,50 80,30 110,15 130,10 150,18 175,38 200,50 230,55 260,56 290,56"
      fill="none" stroke="#1565C0" stroke-width="2" opacity="0.8" filter="url(#glow2)">
      <animate attributeName="stroke-dasharray" from="0,500" to="500,0" dur="1.5s" begin="0s" fill="freeze" repeatCount="1"/>
    </polyline>
    <text x="320" y="32" font-family="'Courier New',monospace" font-size="18" font-weight="bold" fill="white" letter-spacing="4">DAM BREAK ANALYSIS</text>
    <text x="320" y="52" font-family="'Courier New',monospace" font-size="10" fill="#64b5f6" letter-spacing="3" opacity="0.8">OVERTOPPING (OVTP)  ·  PIPING (PIPG)  ·  BREACH HYDROGRAPHS</text>
    <!-- Badge: OVTP -->
    <rect x="800" y="22" width="80" height="36" rx="4" fill="#1565C0" opacity="0.3" stroke="#1565C0" stroke-width="1"/>
    <text x="840" y="43" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#90caf9">OVTP</text>
    <!-- Badge: PIPG -->
    <rect x="900" y="22" width="80" height="36" rx="4" fill="#B71C1C" opacity="0.3" stroke="#B71C1C" stroke-width="1"/>
    <text x="940" y="43" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#ef9a9a">PIPG</text>
    <!-- Badge: 8 PLOTS -->
    <rect x="1000" y="22" width="90" height="36" rx="4" fill="#1B5E20" opacity="0.3" stroke="#2E7D32" stroke-width="1"/>
    <text x="1045" y="43" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#a5d6a7">8 PLOTS</text>
    <rect x="1" y="1" width="1198" height="78" rx="7" fill="none" stroke="#1565C0" stroke-width="0.8" opacity="0.4"/>
  </g>
</svg>
