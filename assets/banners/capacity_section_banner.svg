<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" width="1200" height="80">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a1a10"/>
      <stop offset="50%" style="stop-color:#0d2818"/>
      <stop offset="100%" style="stop-color:#0a1a10"/>
    </linearGradient>
    <linearGradient id="lineGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00695C;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#26a69a;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#26a69a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00695C;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow4"><feGaussianBlur stdDeviation="2.5" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="clip4"><rect width="1200" height="80" rx="8"/></clipPath>
  </defs>
  <g clip-path="url(#clip4)">
    <rect width="1200" height="80" fill="url(#bg4)"/>
    <line x1="0" y1="40" x2="1200" y2="40" stroke="url(#lineGrad4)" stroke-width="0.5" opacity="0.4"/>
    <!-- Capacity curve shape (sigmoid) -->
    <path d="M20,60 Q40,58 70,52 Q100,42 130,28 Q160,16 200,12 Q230,11 260,11 Q280,11 300,12"
      fill="none" stroke="#26a69a" stroke-width="2" filter="url(#glow4)" opacity="0.9">
      <animate attributeName="stroke-dasharray" from="0,400" to="400,0" dur="1.5s" fill="freeze"/>
    </path>
    <text x="320" y="32" font-family="'Courier New',monospace" font-size="18" font-weight="bold" fill="white" letter-spacing="4">RESERVOIR CAPACITY CURVES</text>
    <text x="320" y="52" font-family="'Courier New',monospace" font-size="10" fill="#80cbc4" letter-spacing="3" opacity="0.8">ELEVATION–AREA–CAPACITY  ·  GIS SURVEYED  ·  CONTENT TABLE ANALYSIS</text>
    <rect x="850" y="22" width="100" height="36" rx="4" fill="#004D40" opacity="0.5" stroke="#00695C" stroke-width="1"/>
    <text x="900" y="43" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="#80cbc4">EAC CURVES</text>
    <rect x="970" y="22" width="100" height="36" rx="4" fill="#004D40" opacity="0.5" stroke="#00695C" stroke-width="1"/>
    <text x="1020" y="43" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="#80cbc4">GIS DATA</text>
    <rect x="1" y="1" width="1198" height="78" rx="7" fill="none" stroke="#00695C" stroke-width="0.8" opacity="0.4"/>
  </g>
</svg>
