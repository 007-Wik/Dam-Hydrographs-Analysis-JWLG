<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" width="1200" height="80">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <linearGradient id="lineGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B1FA2;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#ce93d8;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#ce93d8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7B1FA2;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow3"><feGaussianBlur stdDeviation="2.5" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="clip3"><rect width="1200" height="80" rx="8"/></clipPath>
  </defs>
  <g clip-path="url(#clip3)">
    <rect width="1200" height="80" fill="url(#bg3)"/>
    <line x1="0" y1="40" x2="1200" y2="40" stroke="url(#lineGrad3)" stroke-width="0.5" opacity="0.4"/>
    <!-- UH bell-curve shape -->
    <path d="M20,60 Q60,58 100,45 Q130,32 150,12 Q170,32 190,45 Q230,58 280,60"
      fill="none" stroke="#9C27B0" stroke-width="2" filter="url(#glow3)" opacity="0.9">
      <animate attributeName="stroke-dasharray" from="0,400" to="400,0" dur="1.5s" fill="freeze"/>
    </path>
    <text x="320" y="32" font-family="'Courier New',monospace" font-size="18" font-weight="bold" fill="white" letter-spacing="4">SPF HYDROGRAPH ANALYSIS</text>
    <text x="320" y="52" font-family="'Courier New',monospace" font-size="10" fill="#ce93d8" letter-spacing="3" opacity="0.8">STANDARD PROJECT FLOOD  ·  CWC DIMENSIONLESS UNIT HYDROGRAPH  ·  IS:5477</text>
    <rect x="800" y="22" width="120" height="36" rx="4" fill="#4A148C" opacity="0.4" stroke="#7B1FA2" stroke-width="1"/>
    <text x="860" y="43" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="#ce93d8">CWC 1994</text>
    <rect x="940" y="22" width="130" height="36" rx="4" fill="#1B5E20" opacity="0.3" stroke="#2E7D32" stroke-width="1"/>
    <text x="1005" y="43" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="#a5d6a7">4 MASTER PLOTS</text>
    <rect x="1" y="1" width="1198" height="78" rx="7" fill="none" stroke="#7B1FA2" stroke-width="0.8" opacity="0.4"/>
  </g>
</svg>